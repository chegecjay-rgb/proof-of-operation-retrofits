[profile.default]
src = "contracts"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [{ access = "read-write", path = "./" }]

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 32
fail_on_revert = false
